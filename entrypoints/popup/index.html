<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Dopamine Detox</h1>
      <label class="switch master">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="sites" id="sites">
      <div class="toggle-row">
        <span class="label">TikTok</span>
        <label class="switch">
          <input type="checkbox" id="tiktok" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span class="label">YouTube Shorts</span>
        <label class="switch">
          <input type="checkbox" id="youtubeShorts" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span class="label">Instagram Reels</span>
        <label class="switch">
          <input type="checkbox" id="instagramReels" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <p class="version" id="version"></p>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
